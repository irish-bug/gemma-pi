# 1. Shared Playback Mixer (Tied to your USB Speaker)
pcm.dmixed {
    type dmix
    ipc_key 1024
    ipc_perm 0666
    slave.pcm "hw:CARD=Device,DEV=0"  # Binds specifically to the "USB Audio Device"
}

# 2. Shared Capture Mixer (Tied to your ReSpeaker Mic)
pcm.dsnooped {
    type dsnoop
    ipc_key 1025
    ipc_perm 0666
    slave.pcm "hw:CARD=seeed2micvoicec,DEV=0" # Binds specifically to the ReSpeaker HAT
}

# 3. System Defaults with Automatic Rate Converters
pcm.!default {
    type asym
    playback.pcm "plug:dmixed"
    capture.pcm "plug:dsnooped"
}

# 4. Hardware Control Pass-through for Volume (Point to the USB card for Spotify)
ctl.!default {
    type hw
    card Device
}
